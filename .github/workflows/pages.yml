name: Deploy WASM to GitHub Pages

on:
  push:
    branches: ["master"] 
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-bindgen
        run: |
          if ! command -v wasm-bindgen &> /dev/null; then
            cargo install wasm-bindgen-cli --version 0.2.92
          fi

      - name: Build wasm
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Bindgen
        run: wasm-bindgen --target web --no-typescript --out-dir dist target/wasm32-unknown-unknown/release/matrix_crushed.wasm

      - name: Copy web assets
        run: |
          mkdir -p dist
          [ -f web/index.html ] && cp web/index.html dist/index.html
          [ -d assets ] && cp -r assets dist/assets || echo "No assets folder found"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
